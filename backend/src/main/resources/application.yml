spring:
  datasource:
    # 반드시 환경변수로 주입 — 기본값 없음 (없으면 기동 실패)
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:herdsignal}?characterEncoding=UTF-8&serverTimezone=UTC
    username: ${DB_USER:herdsignal}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      # Python(init_db.py)이 생성한 테이블 구조를 그대로 사용 — 스키마 변경 금지
      ddl-auto: validate
    # View 렌더링 중 DB 쿼리 방지 (명시적 비활성화로 WARN 제거)
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        # Spring Boot 3.x에서 MariaDB는 dialect 자동 감지 — 명시 불필요
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

  # DevTools: 클래스 변경 시 자동 재시작 (개발 환경 전용)
  devtools:
    restart:
      enabled: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:disabled}
            client-secret: ${GOOGLE_CLIENT_SECRET:disabled}
            scope: openid,profile,email

server:
  port: 8080

logging:
  level:
    com.herdsignal: ${LOG_LEVEL:INFO}
    org.hibernate.SQL: WARN

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

herdsignal:
  validation-report-path: ${MODEL_VALIDATION_REPORT_PATH:../data/reports/validation_v2/validation_v2.json}
  auth:
    enabled: ${AUTH_ENABLED:false}
    frontend-url: ${FRONTEND_URL:http://localhost:5173}
    owner-email: ${HERDSIGNAL_OWNER_EMAIL:}
