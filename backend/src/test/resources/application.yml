spring:
  datasource:
    url: jdbc:h2:mem:herdsignal;MODE=MariaDB;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  flyway:
    enabled: false

logging:
  level:
    com.herdsignal: WARN
