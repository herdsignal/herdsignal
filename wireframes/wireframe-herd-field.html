<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HerdSignal — Herd Field Prototype</title>
  <style>
    :root {
      --bg: #080d14;
      --surface: #0e151f;
      --line: rgba(151, 166, 187, .18);
      --text: #f3f6fa;
      --muted: #8894a5;
      --flee: #3b82f6;
      --scatter: #60a5fa;
      --calm: #a3aab8;
      --drift: #f97316;
      --rush: #ef4444;
      --stage: var(--drift);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button, a { font: inherit; }
    button { color: inherit; }

    .hero {
      position: relative;
      min-height: 100svh;
      overflow: hidden;
      isolation: isolate;
    }

    #field {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 48%, rgba(8, 13, 20, .08) 0 12%, rgba(8, 13, 20, .72) 33%, rgba(8, 13, 20, .96) 88%),
        linear-gradient(180deg, rgba(8, 13, 20, .28), transparent 24%, transparent 72%, var(--bg));
    }

    .topbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px clamp(24px, 5vw, 72px);
      z-index: 3;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      color: var(--text);
      text-decoration: none;
      font-size: 15px;
      font-weight: 720;
      letter-spacing: -.03em;
    }

    .brand-mark {
      position: relative;
      width: 27px;
      height: 27px;
      border: 1px solid rgba(255, 255, 255, .14);
      border-radius: 8px;
      background: rgba(255, 255, 255, .025);
    }

    .brand-mark::before,
    .brand-mark::after {
      content: "";
      position: absolute;
      top: 6px;
      bottom: 6px;
      width: 4px;
      border-top: 2px dotted var(--stage);
      border-bottom: 2px dotted var(--stage);
      opacity: .9;
    }
    .brand-mark::before { left: 6px; }
    .brand-mark::after { right: 6px; }

    .portfolio-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 12px;
      font-weight: 650;
      letter-spacing: .03em;
      transition: color .2s ease;
    }
    .portfolio-link:hover { color: var(--text); }

    .hero-center {
      min-height: 100svh;
      display: grid;
      place-content: center;
      justify-items: center;
      padding: 108px 24px 150px;
      text-align: center;
    }

    .instrument {
      margin: 0 0 7px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 720;
      letter-spacing: .18em;
    }

    .ticker {
      margin: 0 0 38px;
      font-size: clamp(24px, 3vw, 38px);
      font-weight: 600;
      letter-spacing: .18em;
      text-indent: .18em;
    }

    .index-label {
      margin-bottom: 11px;
      color: #697587;
      font-size: 9px;
      font-weight: 760;
      letter-spacing: .2em;
    }

    .score-line {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 13px;
    }

    .score {
      margin: 0;
      font-size: clamp(92px, 12vw, 176px);
      font-weight: 280;
      line-height: .82;
      letter-spacing: -.075em;
      text-shadow: 0 0 80px color-mix(in srgb, var(--stage) 16%, transparent);
    }

    .score-max {
      margin-bottom: 10px;
      color: #5d6878;
      font-size: 12px;
      font-weight: 620;
      letter-spacing: .04em;
    }

    .stage {
      margin: 26px 0 0;
      color: var(--stage);
      font-size: clamp(18px, 2.2vw, 30px);
      font-weight: 680;
      letter-spacing: .38em;
      text-indent: .38em;
      transition: color .5s ease;
    }

    .state-ko {
      margin-top: 13px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 570;
      letter-spacing: .08em;
    }

    .spectrum-wrap {
      position: absolute;
      left: 50%;
      bottom: 50px;
      width: min(760px, calc(100vw - 48px));
      transform: translateX(-50%);
      z-index: 3;
    }

    .spectrum-labels {
      display: grid;
      grid-template-columns: 15fr 25fr 20fr 15fr 25fr;
      margin-bottom: 12px;
      color: #697587;
      font-size: 9px;
      font-weight: 680;
      letter-spacing: .1em;
      text-transform: uppercase;
    }
    .spectrum-labels span:nth-child(n+2):nth-child(-n+4) { text-align: center; }
    .spectrum-labels span:last-child { text-align: right; }

    .spectrum {
      position: relative;
      height: 2px;
      background: linear-gradient(90deg,
        var(--flee) 0 15%,
        var(--scatter) 15% 40%,
        var(--calm) 40% 60%,
        var(--drift) 60% 75%,
        var(--rush) 75% 100%);
      box-shadow: 0 0 18px rgba(255, 255, 255, .05);
    }

    .threshold {
      position: absolute;
      top: -3px;
      width: 1px;
      height: 8px;
      background: var(--bg);
      opacity: .8;
    }
    .threshold:nth-child(1) { left: 15%; }
    .threshold:nth-child(2) { left: 40%; }
    .threshold:nth-child(3) { left: 60%; }
    .threshold:nth-child(4) { left: 75%; }

    .marker {
      position: absolute;
      top: 50%;
      left: 64%;
      width: 12px;
      height: 12px;
      border: 2px solid var(--stage);
      border-radius: 50%;
      background: var(--bg);
      transform: translate(-50%, -50%);
      transition: left .65s cubic-bezier(.22, .8, .26, 1), border-color .5s ease;
    }

    .marker-value {
      position: absolute;
      top: 15px;
      left: 50%;
      color: var(--stage);
      font-size: 9px;
      font-weight: 750;
      transform: translateX(-50%);
      transition: color .5s ease;
    }

    .asof {
      display: flex;
      justify-content: space-between;
      margin-top: 30px;
      color: #606b7b;
      font-size: 10px;
    }
    .asof a {
      color: #aeb7c4;
      text-decoration: none;
    }

    .prototype-control {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 10;
      display: flex;
      gap: 4px;
      padding: 5px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(8, 13, 20, .82);
      backdrop-filter: blur(14px);
    }
    .prototype-control button {
      width: 29px;
      height: 27px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: #606b7b;
      cursor: pointer;
      font-size: 9px;
      font-weight: 750;
    }
    .prototype-control button.active {
      background: var(--surface);
      color: var(--stage);
    }

    .formation {
      min-height: 100svh;
      padding: 78px clamp(24px, 7vw, 112px) 96px;
      border-top: 1px solid rgba(255, 255, 255, .06);
      background: var(--bg);
    }

    .signal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 22px;
      border-bottom: 1px solid var(--line);
    }
    .signal-title {
      margin: 0;
      font-size: 12px;
      font-weight: 720;
      letter-spacing: .16em;
    }
    .mock-label {
      color: #697587;
      font-size: 8px;
      font-weight: 720;
      letter-spacing: .13em;
      text-transform: uppercase;
    }

    .signal-stage {
      position: relative;
      min-height: 470px;
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      align-items: start;
      gap: clamp(12px, 3vw, 42px);
      padding: 62px 0 210px;
    }

    .signal {
      position: relative;
      z-index: 2;
      appearance: none;
      padding: 0 0 17px;
      border: 0;
      border-bottom: 1px solid var(--line);
      background: transparent;
      text-align: left;
      cursor: pointer;
      transition: border-color .2s ease;
    }
    .signal::after {
      content: "";
      position: absolute;
      left: 50%;
      top: calc(100% + 1px);
      width: 1px;
      height: 118px;
      transform-origin: top;
      background: linear-gradient(var(--signal-color), transparent);
      opacity: .3;
    }
    .signal:nth-child(1)::after { transform: rotate(-19deg); }
    .signal:nth-child(2)::after { transform: rotate(-7deg); }
    .signal:nth-child(3)::after { transform: rotate(7deg); }
    .signal:nth-child(4)::after { transform: rotate(19deg); }
    .signal.active { border-color: var(--signal-color); }
    .signal-name {
      color: #687486;
      font-size: 9px;
      font-weight: 760;
      letter-spacing: .14em;
    }
    .signal-value {
      display: block;
      margin-top: 13px;
      color: var(--text);
      font-size: clamp(34px, 4vw, 58px);
      font-weight: 330;
      letter-spacing: -.06em;
    }
    .signal-state {
      display: block;
      margin-top: 6px;
      color: var(--signal-color);
      font-size: 9px;
      font-weight: 680;
      letter-spacing: .1em;
    }

    .merge-field {
      position: absolute;
      left: 50%;
      bottom: 28px;
      width: min(470px, 68vw);
      height: 195px;
      transform: translateX(-50%);
    }
    .merge-field svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    .merge-line {
      fill: none;
      stroke: #526071;
      stroke-width: 1;
      stroke-dasharray: 2 8;
      opacity: .52;
    }
    .h-bridge {
      fill: none;
      stroke: var(--stage);
      stroke-width: 1;
      opacity: .32;
    }
    .herd-node {
      position: absolute;
      left: 50%;
      bottom: 0;
      display: grid;
      place-items: center;
      width: 126px;
      height: 126px;
      border: 1px solid color-mix(in srgb, var(--stage) 35%, transparent);
      border-radius: 50%;
      background: radial-gradient(circle, color-mix(in srgb, var(--stage) 10%, transparent), transparent 68%);
      transform: translateX(-50%);
    }
    .herd-node-label {
      color: #697587;
      font-size: 8px;
      font-weight: 750;
      letter-spacing: .16em;
    }
    .herd-node strong {
      display: block;
      margin-top: 4px;
      font-size: 46px;
      font-weight: 330;
      letter-spacing: -.07em;
    }
    .herd-node-state {
      display: block;
      margin-top: 2px;
      color: var(--stage);
      font-size: 8px;
      font-weight: 720;
      letter-spacing: .12em;
    }

    .signal-detail {
      display: grid;
      grid-template-columns: 170px 1fr;
      gap: clamp(30px, 7vw, 110px);
      min-height: 220px;
      padding-top: 34px;
      border-top: 1px solid var(--line);
    }
    .detail-head span {
      color: #687486;
      font-size: 9px;
      font-weight: 760;
      letter-spacing: .14em;
    }
    .detail-head strong {
      display: block;
      margin-top: 12px;
      font-size: 38px;
      font-weight: 350;
      letter-spacing: -.05em;
    }
    .detail-metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(120px, 1fr));
      gap: 0 34px;
    }
    .metric {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 20px;
      min-height: 62px;
      border-bottom: 1px solid var(--line);
    }
    .metric span {
      color: #8d98a8;
      font-size: 10px;
    }
    .metric strong {
      font-size: 11px;
      font-weight: 620;
      font-variant-numeric: tabular-nums;
    }
    .metric em {
      margin-left: 8px;
      color: #596575;
      font-size: 8px;
      font-style: normal;
    }
    .metric.hidden { display: none; }
    .detail-model {
      align-self: end;
      color: #596575;
      font-size: 9px;
      letter-spacing: .08em;
    }

    @media (max-width: 820px) {
      .topbar { padding: 22px 20px; }
      .hero-center { padding-bottom: 180px; }
      .ticker { margin-bottom: 31px; }
      .score-max { margin-bottom: 7px; }
      .prototype-control { display: none; }
      .spectrum-wrap { bottom: 54px; }
      .spectrum-labels { font-size: 7px; }
      .asof { margin-top: 25px; }
      .formation { padding-block: 64px; }
      .signal-stage {
        grid-template-columns: repeat(2, 1fr);
        gap: 28px 18px;
        padding-bottom: 230px;
      }
      .signal::after { display: none; }
      .merge-field { width: min(390px, 100%); }
      .signal-detail { grid-template-columns: 1fr; }
      .detail-metrics { grid-template-columns: 1fr; }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      #field { opacity: .6; }
      *, *::before, *::after { transition-duration: .01ms !important; }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero" aria-labelledby="market-state">
      <canvas id="field" aria-hidden="true"></canvas>

      <header class="topbar">
        <a class="brand" href="#">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>HerdSignal</span>
        </a>
        <a class="portfolio-link" href="#">PORTFOLIO&nbsp;&nbsp;↗</a>
      </header>

      <div class="hero-center">
        <p class="instrument">S&amp;P 500</p>
        <p class="ticker">SPY</p>
        <div class="index-label">HERD INDEX</div>
        <div class="score-line">
          <h1 class="score" id="market-state">64</h1>
          <span class="score-max">/ 100</span>
        </div>
        <p class="stage">DRIFT</p>
        <p class="state-ko">군중 밀집 시작</p>
      </div>

      <div class="spectrum-wrap">
        <div class="spectrum-labels" aria-hidden="true">
          <span>Flee</span><span>Scatter</span><span>Calm</span><span>Drift</span><span>Rush</span>
        </div>
        <div class="spectrum" role="img" aria-label="HERD 64점, Drift 구간">
          <i class="threshold"></i><i class="threshold"></i><i class="threshold"></i><i class="threshold"></i>
          <div class="marker"><span class="marker-value">64</span></div>
        </div>
        <div class="asof">
          <span>2026.07.18 기준</span>
          <a href="#formation">상세 관측&nbsp;&nbsp;↓</a>
        </div>
      </div>
    </section>

    <section class="formation" id="formation">
      <header class="signal-header">
        <h2 class="signal-title">SPY / SIGNALS</h2>
        <span class="mock-label">PROTOTYPE · MOCK DATA</span>
      </header>

      <div class="signal-stage">
        <button class="signal active" style="--signal-color:#f97316" data-signal="participation">
          <span class="signal-name">PARTICIPATION</span>
          <strong class="signal-value">68</strong>
          <span class="signal-state">DRIFT</span>
        </button>
        <button class="signal" style="--signal-color:#60a5fa" data-signal="trend">
          <span class="signal-name">TREND</span>
          <strong class="signal-value">72</strong>
          <span class="signal-state">STRONG</span>
        </button>
        <button class="signal" style="--signal-color:#a3aab8" data-signal="risk">
          <span class="signal-name">RISK</span>
          <strong class="signal-value">55</strong>
          <span class="signal-state">STABLE</span>
        </button>
        <button class="signal" style="--signal-color:#22c55e" data-signal="business">
          <span class="signal-name">BUSINESS</span>
          <strong class="signal-value">61</strong>
          <span class="signal-state">SOUND</span>
        </button>

        <div class="merge-field" aria-label="참여, 추세, 위험, 기업 상태 후보와 HERD 64">
          <svg viewBox="0 0 470 195" preserveAspectRatio="none" aria-hidden="true">
            <path class="merge-line" d="M15 0 C15 70 188 52 188 112"></path>
            <path class="merge-line" d="M160 0 C160 72 216 58 216 112"></path>
            <path class="merge-line" d="M310 0 C310 72 254 58 254 112"></path>
            <path class="merge-line" d="M455 0 C455 70 282 52 282 112"></path>
            <path class="h-bridge" d="M188 68 V130 M282 68 V130 M188 99 H282"></path>
          </svg>
          <div class="herd-node">
            <div>
              <span class="herd-node-label">HERD</span>
              <strong>64</strong>
              <span class="herd-node-state">DRIFT</span>
            </div>
          </div>
        </div>
      </div>

      <div class="signal-detail">
        <div class="detail-head">
          <span id="detail-name">PARTICIPATION</span>
          <strong id="detail-value">68</strong>
        </div>
        <div>
          <div class="detail-metrics" id="detail-metrics"></div>
          <div class="detail-model" id="detail-model">RESEARCH CANDIDATE · PARTICIPATION</div>
        </div>
      </div>
    </section>
  </main>

  <div class="prototype-control" aria-label="프로토타입 단계 미리보기">
    <button data-score="8" title="Flee">F</button>
    <button data-score="28" title="Scatter">S</button>
    <button data-score="50" title="Calm">C</button>
    <button class="active" data-score="64" title="Drift">D</button>
    <button data-score="88" title="Rush">R</button>
  </div>

  <script>
    const canvas = document.querySelector('#field')
    const ctx = canvas.getContext('2d')
    const root = document.documentElement
    const scoreEl = document.querySelector('.score')
    const stageEl = document.querySelector('.stage')
    const stateEl = document.querySelector('.state-ko')
    const marker = document.querySelector('.marker')
    const markerValue = document.querySelector('.marker-value')
    const spectrum = document.querySelector('.spectrum')
    const herdNodeScore = document.querySelector('.herd-node strong')
    const herdNodeState = document.querySelector('.herd-node-state')
    const detailName = document.querySelector('#detail-name')
    const detailValue = document.querySelector('#detail-value')
    const detailMetrics = document.querySelector('#detail-metrics')
    const detailModel = document.querySelector('#detail-model')
    const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches

    const states = [
      { max: 15, name: 'FLEE', ko: '군중 이탈', color: '#3b82f6', groups: 7, cohesion: .00045, speed: .72 },
      { max: 40, name: 'SCATTER', ko: '군중 분산', color: '#60a5fa', groups: 4, cohesion: .0012, speed: .58 },
      { max: 59, name: 'CALM', ko: '군중 균형', color: '#a3aab8', groups: 3, cohesion: .002, speed: .35 },
      { max: 74, name: 'DRIFT', ko: '군중 밀집 시작', color: '#f97316', groups: 2, cohesion: .0031, speed: .43 },
      { max: 100, name: 'RUSH', ko: '군중 밀집', color: '#ef4444', groups: 1, cohesion: .0048, speed: .38 }
    ]

    const signalDetails = {
      participation: {
        name: 'PARTICIPATION',
        value: 68,
        model: 'RESEARCH CANDIDATE · PARTICIPATION',
        metrics: [
          ['200일선 상회 종목', '72%', ''],
          ['신고가 / 신저가', '2.4', ''],
          ['동일가중 상대강도', '61', ''],
          ['거래 참여', 'ABOVE', '']
        ]
      },
      trend: {
        name: 'TREND',
        value: 72,
        model: 'RESEARCH CANDIDATE · TREND',
        metrics: [
          ['12-1 모멘텀', '72', ''],
          ['200일 추세', 'UP', ''],
          ['섹터 상대강도', '64', ''],
          ['SPY 상대강도', '61', '']
        ]
      },
      risk: {
        name: 'RISK',
        value: 55,
        model: 'RESEARCH CANDIDATE · DOWNSIDE RISK',
        metrics: [
          ['하방 변동성', '52', ''],
          ['현재 낙폭', '-4.8%', ''],
          ['갭 위험', 'LOW', ''],
          ['변동성 체제', 'NORMAL', '']
        ]
      },
      business: {
        name: 'BUSINESS',
        value: 61,
        model: 'RESEARCH CANDIDATE · FUNDAMENTALS',
        metrics: [
          ['수익성', '68', ''],
          ['재무 건전성', '64', ''],
          ['상대 가치', '49', ''],
          ['실적 수정', 'PENDING', '']
        ]
      }
    }

    let width = 0
    let height = 0
    let dpr = 1
    let score = 64
    let state = states[3]
    let particles = []
    let frame = 0

    function resize() {
      dpr = Math.min(devicePixelRatio || 1, 2)
      width = innerWidth
      height = innerHeight
      canvas.width = Math.round(width * dpr)
      canvas.height = Math.round(height * dpr)
      canvas.style.width = width + 'px'
      canvas.style.height = height + 'px'
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0)
      createParticles()
    }

    function createParticles() {
      const count = Math.max(72, Math.min(150, Math.round(width / 10)))
      particles = Array.from({ length: count }, (_, i) => ({
        x: Math.random() * width,
        y: Math.random() * height,
        vx: (Math.random() - .5) * .2,
        vy: (Math.random() - .5) * .2,
        size: .7 + Math.random() * 1.8,
        alpha: .22 + Math.random() * .58,
        group: i % state.groups,
        phase: Math.random() * Math.PI * 2
      }))
    }

    function getTarget(p, time) {
      const spreadX = width * (.36 - score * .0024)
      const spreadY = height * (.29 - score * .0018)
      const angle = (p.group / state.groups) * Math.PI * 2 + time * .000035
      const cx = width * .5
      const cy = height * .46
      return {
        x: cx + Math.cos(angle) * Math.max(22, spreadX),
        y: cy + Math.sin(angle) * Math.max(18, spreadY)
      }
    }

    function inTextSafeZone(x, y) {
      return Math.abs(x - width * .5) < 170 && Math.abs(y - height * .46) < 210
    }

    function drawHField() {
      const cx = width * .5
      const cy = height * .46
      const h = Math.min(310, height * .34)
      const w = Math.min(230, width * .18)
      ctx.save()
      ctx.strokeStyle = state.color
      ctx.globalAlpha = .075
      ctx.shadowColor = state.color
      ctx.shadowBlur = 10
      ctx.lineWidth = 1
      ctx.setLineDash([1, 11])
      ctx.beginPath()
      ctx.moveTo(cx - w / 2, cy - h / 2)
      ctx.lineTo(cx - w / 2, cy + h / 2)
      ctx.moveTo(cx + w / 2, cy - h / 2)
      ctx.lineTo(cx + w / 2, cy + h / 2)
      ctx.moveTo(cx - w / 2, cy)
      ctx.lineTo(cx + w / 2, cy)
      ctx.stroke()
      ctx.restore()
    }

    function animate(time = 0) {
      frame = requestAnimationFrame(animate)
      ctx.clearRect(0, 0, width, height)
      drawHField()

      for (const p of particles) {
        const target = getTarget(p, time)
        const dx = target.x - p.x
        const dy = target.y - p.y
        p.vx += dx * state.cohesion
        p.vy += dy * state.cohesion

        const ambient = reduceMotion ? 0 : .005
        p.vx += Math.cos(time * .00035 + p.phase) * ambient
        p.vy += Math.sin(time * .00029 + p.phase) * ambient

        if (state.name === 'FLEE') {
          const fx = p.x - width * .5
          const fy = p.y - height * .46
          const distance = Math.max(80, Math.hypot(fx, fy))
          p.vx += fx / distance * .005
          p.vy += fy / distance * .005
        }

        p.vx *= .965
        p.vy *= .965
        const speedLimit = state.speed
        const speed = Math.hypot(p.vx, p.vy)
        if (speed > speedLimit) {
          p.vx = p.vx / speed * speedLimit
          p.vy = p.vy / speed * speedLimit
        }

        p.x += p.vx
        p.y += p.vy

        if (p.x < -20) p.x = width + 20
        if (p.x > width + 20) p.x = -20
        if (p.y < -20) p.y = height + 20
        if (p.y > height + 20) p.y = -20

        ctx.beginPath()
        ctx.fillStyle = state.color
        ctx.globalAlpha = inTextSafeZone(p.x, p.y) ? p.alpha * .16 : p.alpha
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2)
        ctx.fill()
      }
      ctx.globalAlpha = 1
    }

    function setScore(nextScore) {
      score = nextScore
      state = states.find(item => score <= item.max)
      root.style.setProperty('--stage', state.color)
      scoreEl.textContent = score
      stageEl.textContent = state.name
      stateEl.textContent = state.ko
      marker.style.left = score + '%'
      markerValue.textContent = score
      herdNodeScore.textContent = score
      herdNodeState.textContent = state.name
      spectrum.setAttribute('aria-label', `HERD ${score}점, ${state.name} 구간`)
      particles.forEach((particle, index) => { particle.group = index % state.groups })
      document.querySelectorAll('.prototype-control button').forEach(button => {
        button.classList.toggle('active', Number(button.dataset.score) === score)
      })
    }

    function renderSignalDetail(key) {
      const detail = signalDetails[key]
      detailName.textContent = detail.name
      detailValue.textContent = detail.value
      detailModel.textContent = detail.model
      detailMetrics.replaceChildren(...detail.metrics.map(([label, value, weight]) => {
        const row = document.createElement('div')
        row.className = 'metric'
        const name = document.createElement('span')
        name.textContent = label
        const result = document.createElement('strong')
        result.textContent = value
        if (weight) {
          const meta = document.createElement('em')
          meta.textContent = weight
          result.append(meta)
        }
        row.append(name, result)
        return row
      }))
      document.querySelectorAll('.signal').forEach(button => {
        button.classList.toggle('active', button.dataset.signal === key)
      })
    }

    document.querySelectorAll('.prototype-control button').forEach(button => {
      button.addEventListener('click', () => setScore(Number(button.dataset.score)))
    })
    document.querySelectorAll('.signal').forEach(button => {
      button.addEventListener('click', () => renderSignalDetail(button.dataset.signal))
    })

    addEventListener('resize', resize)
    addEventListener('visibilitychange', () => {
      if (document.hidden) cancelAnimationFrame(frame)
      else animate()
    })

    resize()
    renderSignalDetail('crowd')
    animate()
  </script>
</body>
</html>
